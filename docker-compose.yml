services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - UPLOAD_DIR=${UPLOAD_DIR:-/data/uploads}
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-/data/chroma}
      - ATTACK_STIX_DIR=${ATTACK_STIX_DIR:-/data/attack}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./data:/data
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # npm install (not just the image's build-time `npm ci`) runs on every
    # container start: /app/node_modules is an anonymous volume that outlives
    # `docker compose down`/`up` and even an image rebuild, so it silently goes
    # stale whenever package.json changes — this keeps it self-healing instead
    # of requiring a manual `npm install` inside the container.
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      # Lets Ollama actually process embedding requests concurrently instead of
      # queueing them one at a time behind a single execution slot; matches
      # EMBED_WORKERS in app.attack.build_kb.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models:
